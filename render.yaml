services:
  - type: web
    name: veltrix-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GOOGLE_MAPS_KEY
        sync: false   # set manually in Render dashboard
      - key: HUNTER_KEY
        sync: false
